<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Digital - Restaurante</title>
    <!-- Use basic styling for quick rendering, but Tailwind CDN for utility classes as requested -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    
    <header class="bg-white shadow-sm py-6 mb-8 text-center sticky top-0 z-10">
        <h1 class="text-3xl font-bold tracking-tight text-gray-800">Nuestra Carta</h1>
    </header>

    <main id="app-container" class="container mx-auto px-4 pb-12 max-w-5xl">
        <!-- Content injected via app.js -->
    </main>

    <!-- Image Modal -->
    <div id="image-modal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-90 flex items-center justify-center p-4 transition-opacity duration-300" onclick="closeModal()">
        <span class="absolute top-4 right-6 text-white text-5xl font-light cursor-pointer hover:text-gray-300">&times;</span>
        <img id="modal-image" class="max-w-full max-h-full object-contain rounded shadow-2xl" src="" alt="">
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
