<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clandestina de las Tendillas - Carta</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <h1 class="brand-title">Clandestina</h1>
                <p class="brand-subtitle">de las Tendillas</p>
            </div>
            
            <!-- Categories Container -->
            <nav class="categories-nav">
                <button class="cat-btn active" data-category="all">Todos</button>
                <button class="cat-btn" data-category="divertimento">Divertimentos</button>
                <button class="cat-btn" data-category="entrante">Entrantes</button>
                <button class="cat-btn" data-category="principal">Principales</button>
                <button class="cat-btn" data-category="postre">Postres</button>
            </nav>

            <!-- Dietary & Allergen Profile Grid -->
            <details class="dietary-section">
                <summary class="dietary-summary">
                    <div class="dietary-title-container">
                        <h3 class="dietary-title">Perfil Dietético / Alérgenos</h3>
                        <span class="active-filters-badge" id="active-filters-count" style="display:none;">0</span>
                    </div>
                    <i class="fa-solid fa-chevron-down toggle-icon"></i>
                </summary>
                <div class="dietary-content">
                    <p class="dietary-subtitle">Selecciona para ver platos libres del alérgeno:</p>
                    <div class="dietary-grid" id="filter-group-container">
                        <!-- Standard permanent filters -->
                        <button class="diet-btn permanent" data-filter="veg">
                            <i class="fa-solid fa-leaf"></i> Veg / Vegano
                        </button>
                        <!-- Allergen filters will be injected here via JS -->
                    </div>
                    <button class="reset-filters-btn" id="reset-filters" style="display:none;">
                        <i class="fa-solid fa-rotate-left"></i> Restablecer Filtros
                    </button>
                </div>
            </details>
        </header>

        <!-- Menu Content -->
        <main class="menu-container" id="menu-container">
            <!-- Dishes will be injected here via JS -->
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Clandestina de las Tendillas</p>
            <p class="footer-note">Contacte con el personal para más información sobre alérgenos cruzados.</p>
        </footer>
    </div>

    <!-- Data and App Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
